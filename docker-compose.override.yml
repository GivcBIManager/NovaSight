# NovaSight Development Overrides
# =================================
# This file contains development-specific overrides
# It's automatically loaded by docker-compose

services:
  # ============================================
  # Backend - Development Mode
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      SEED_USERS: "true"
      SEED_PASSWORD: "NovaSight@2026"
    volumes:
      - ./backend:/app
      - ./docker/backend/entrypoint.sh:/entrypoint.sh
    command: flask run --host=0.0.0.0 --reload --debug

  # ============================================
  # Frontend - Development Mode with HMR
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  # ============================================
  # Airflow - Debug Mode
  # ============================================
  airflow-api-server:
    environment:
      AIRFLOW__WEBSERVER__RELOAD_ON_PLUGIN_CHANGE: "true"
      AIRFLOW__LOGGING__LOGGING_LEVEL: DEBUG

  airflow-scheduler:
    environment:
      AIRFLOW__LOGGING__LOGGING_LEVEL: DEBUG

  # ============================================
  # Spark - Resources for Dev
  # ============================================
  spark-worker-1:
    environment:
      SPARK_WORKER_MEMORY: 3G
      SPARK_WORKER_CORES: 2

  spark-worker-2:
    environment:
      SPARK_WORKER_MEMORY: 3G
      SPARK_WORKER_CORES: 2
