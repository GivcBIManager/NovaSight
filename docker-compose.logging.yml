# NovaSight Logging Infrastructure
# =================================
# Docker Compose configuration for centralized logging with Loki
# 
# Usage:
#   docker-compose -f docker-compose.logging.yml up -d    # Start logging stack
#   docker-compose -f docker-compose.logging.yml logs -f  # View logs
#   docker-compose -f docker-compose.logging.yml down     # Stop logging stack
#
# Combine with main docker-compose:
#   docker-compose -f docker-compose.yml -f docker-compose.logging.yml up -d

version: '3.8'

services:
  # ============================================
  # Loki - Log Aggregation
  # ============================================
  loki:
    image: grafana/loki:2.9.3
    container_name: novasight-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./logging/loki/loki-local-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novasight-network

  # ============================================
  # Promtail - Log Collector (for Docker logs)
  # ============================================
  promtail:
    image: grafana/promtail:2.9.3
    container_name: novasight-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - ./logging/promtail/promtail-docker-config.yaml:/etc/promtail/config.yaml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - promtail_positions:/positions
    depends_on:
      - loki
    networks:
      - novasight-network

  # ============================================
  # Grafana - Visualization (with Loki datasource)
  # ============================================
  grafana-logs:
    image: grafana/grafana:10.2.3
    container_name: novasight-grafana-logs
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: novasight
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - ./logging/grafana/provisioning:/etc/grafana/provisioning
      - ./logging/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_logs_data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - novasight-network

# ============================================
# Volumes
# ============================================
volumes:
  loki_data:
    name: novasight-loki-data
  promtail_positions:
    name: novasight-promtail-positions
  grafana_logs_data:
    name: novasight-grafana-logs-data

# ============================================
# Networks
# ============================================
networks:
  novasight-network:
    external: true
