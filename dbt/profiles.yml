novasight:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    # =========================================================================
    # Lake target: dbt-duckdb reading from Iceberg on S3
    # Used for staging and intermediate layers
    # =========================================================================
    lake:
      type: duckdb
      path: ":memory:"
      threads: "{{ env_var('DUCKDB_THREADS', 4) | int }}"
      extensions:
        - iceberg
        - httpfs
      settings:
        # S3 configuration for Iceberg access
        s3_region: "{{ env_var('AWS_REGION', 'us-east-1') }}"
        s3_endpoint: "{{ env_var('S3_ENDPOINT_URL', '') }}"
        s3_access_key_id: "{{ env_var('AWS_ACCESS_KEY_ID', '') }}"
        s3_secret_access_key: "{{ env_var('AWS_SECRET_ACCESS_KEY', '') }}"
        s3_url_style: "path"
        memory_limit: "{{ env_var('DUCKDB_MEMORY_LIMIT', '4GB') }}"
      
    # =========================================================================
    # Warehouse target: dbt-clickhouse writing to marts
    # Used for marts/materialized tables for analytics
    # =========================================================================
    warehouse:
      type: clickhouse
      schema: "{{ env_var('TENANT_DATABASE', 'default') }}"
      host: "{{ env_var('CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('CLICKHOUSE_PORT', 8123) | int }}"
      user: "{{ env_var('CLICKHOUSE_USER', 'default') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD', '') }}"
      secure: false
      verify: false

    # =========================================================================
    # Legacy targets (backward compatibility)
    # =========================================================================
    dev:
      type: clickhouse
      schema: "{{ env_var('TENANT_DATABASE', 'default') }}"
      host: "{{ env_var('CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('CLICKHOUSE_PORT', 8123) | int }}"
      user: "{{ env_var('CLICKHOUSE_USER', 'default') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD', '') }}"
      secure: false
      verify: false
      
    prod:
      type: clickhouse
      schema: "{{ env_var('TENANT_DATABASE') }}"
      host: "{{ env_var('CLICKHOUSE_HOST') }}"
      port: "{{ env_var('CLICKHOUSE_PORT', 8123) | int }}"
      user: "{{ env_var('CLICKHOUSE_USER') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD') }}"
      secure: true
      verify: true
