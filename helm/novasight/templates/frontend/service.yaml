{{- if .Values.frontend.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "novasight.frontend.fullname" . }}
  labels:
    {{- include "novasight.frontend.labels" . | nindent 4 }}
  {{- with .Values.frontend.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.targetPort | default "http" }}
      protocol: TCP
      name: http
  selector:
    {{- include "novasight.frontend.selectorLabels" . | nindent 4 }}
{{- end }}
