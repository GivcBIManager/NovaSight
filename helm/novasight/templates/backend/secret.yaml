{{- if .Values.backend.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "novasight.backend.fullname" . }}-secrets
  labels:
    {{- include "novasight.backend.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.backend.secrets.databaseUrl }}
  DATABASE_URL: {{ .Values.backend.secrets.databaseUrl | b64enc | quote }}
  {{- else }}
  # Placeholder - should be replaced with actual secrets via sealed-secrets or external-secrets
  DATABASE_URL: {{ printf "postgresql://%s@%s:%s/%s" .Values.postgresql.auth.username (include "novasight.postgresql.host" .) (include "novasight.postgresql.port" .) .Values.postgresql.auth.database | b64enc | quote }}
  {{- end }}
  
  {{- if .Values.backend.secrets.secretKey }}
  SECRET_KEY: {{ .Values.backend.secrets.secretKey | b64enc | quote }}
  {{- else }}
  SECRET_KEY: {{ randAlphaNum 64 | b64enc | quote }}
  {{- end }}
  
  {{- if .Values.backend.secrets.jwtSecretKey }}
  JWT_SECRET_KEY: {{ .Values.backend.secrets.jwtSecretKey | b64enc | quote }}
  {{- else }}
  JWT_SECRET_KEY: {{ randAlphaNum 64 | b64enc | quote }}
  {{- end }}
  
  {{- if .Values.backend.secrets.encryptionMasterKey }}
  ENCRYPTION_MASTER_KEY: {{ .Values.backend.secrets.encryptionMasterKey | b64enc | quote }}
  {{- else }}
  ENCRYPTION_MASTER_KEY: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  
  {{- if .Values.backend.secrets.redisUrl }}
  REDIS_URL: {{ .Values.backend.secrets.redisUrl | b64enc | quote }}
  {{- else if .Values.redis.enabled }}
  REDIS_URL: {{ printf "redis://:%s@%s:%s/0" .Values.redis.auth.password (include "novasight.redis.host" .) (include "novasight.redis.port" .) | b64enc | quote }}
  {{- end }}
  
  {{- if .Values.backend.secrets.clickhouseUrl }}
  CLICKHOUSE_URL: {{ .Values.backend.secrets.clickhouseUrl | b64enc | quote }}
  {{- end }}
  
  {{- if .Values.backend.secrets.ollamaApiKey }}
  OLLAMA_API_KEY: {{ .Values.backend.secrets.ollamaApiKey | b64enc | quote }}
  {{- end }}
{{- end }}
