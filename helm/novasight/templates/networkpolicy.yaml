{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "novasight.fullname" . }}-backend
  labels:
    {{- include "novasight.backend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "novasight.backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from frontend
    - from:
        - podSelector:
            matchLabels:
              {{- include "novasight.frontend.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5000
    # Allow ingress from ingress controller namespace
    {{- range .Values.networkPolicy.allowedNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
      ports:
        - protocol: TCP
          port: 5000
    {{- end }}
    # Allow Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
  egress:
    # Allow egress to PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # Allow egress to Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow egress to ClickHouse
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: clickhouse
      ports:
        - protocol: TCP
          port: 8123
        - protocol: TCP
          port: 9000
    # Allow egress to Ollama
    {{- if .Values.ollama.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: ollama
      ports:
        - protocol: TCP
          port: 11434
    {{- end }}
    # Allow DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "novasight.fullname" . }}-frontend
  labels:
    {{- include "novasight.frontend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "novasight.frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from ingress controller namespace
    {{- range .Values.networkPolicy.allowedNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
      ports:
        - protocol: TCP
          port: 80
    {{- end }}
  egress:
    # Allow egress to backend
    - to:
        - podSelector:
            matchLabels:
              {{- include "novasight.backend.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5000
    # Allow DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
{{- end }}
