# NovaSight Helm Chart - Default Values
# This is a YAML-formatted file.

# Global settings
global:
  imageRegistry: ghcr.io/novasight
  imagePullSecrets: []
  storageClass: ""

# Override chart name
nameOverride: ""
fullnameOverride: ""

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod Security Context (applies to all pods)
podSecurityContext:
  fsGroup: 1000

# Container Security Context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -----------------------------------------------------------------------------
# Backend Configuration
# -----------------------------------------------------------------------------
backend:
  enabled: true
  replicaCount: 3
  
  image:
    repository: backend
    tag: latest
    pullPolicy: Always
  
  service:
    type: ClusterIP
    port: 80
    targetPort: 5000
    annotations: {}
  
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  # Environment variables (non-sensitive)
  env:
    FLASK_ENV: production
    LOG_LEVEL: INFO
    WORKERS: "4"
    THREADS: "2"
  
  # Secrets (should be provided via sealed-secrets or external-secrets)
  secrets:
    databaseUrl: ""
    secretKey: ""
    encryptionMasterKey: ""
    jwtSecretKey: ""
    redisUrl: ""
    clickhouseUrl: ""
    ollamaApiKey: ""
  
  # Health probes
  livenessProbe:
    httpGet:
      path: /api/v1/health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  
  readinessProbe:
    httpGet:
      path: /api/v1/health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  
  startupProbe:
    httpGet:
      path: /api/v1/health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 30
  
  # Node selector, tolerations, affinity
  nodeSelector: {}
  tolerations: []
  affinity: {}
  
  # Pod disruption budget
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  
  # Extra volumes and volume mounts
  extraVolumes: []
  extraVolumeMounts: []

# -----------------------------------------------------------------------------
# Frontend Configuration
# -----------------------------------------------------------------------------
frontend:
  enabled: true
  replicaCount: 2
  
  image:
    repository: frontend
    tag: latest
    pullPolicy: Always
  
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
    annotations: {}
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  
  # Environment variables
  env:
    VITE_API_URL: /api
  
  # Health probes
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 30
  
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  
  # Node selector, tolerations, affinity
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# Ingress Configuration
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  hosts:
    - host: novasight.io
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend
    - host: api.novasight.io
      paths:
        - path: /
          pathType: Prefix
          service: backend
  tls:
    - secretName: novasight-tls
      hosts:
        - novasight.io
        - api.novasight.io

# -----------------------------------------------------------------------------
# Airflow Configuration
# -----------------------------------------------------------------------------
airflow:
  enabled: true
  executor: CeleryExecutor
  
  webserver:
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
  
  scheduler:
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
  
  workers:
    replicas: 3
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 4000m
        memory: 8Gi
  
  # DAGs configuration
  dags:
    persistence:
      enabled: true
      size: 10Gi
    gitSync:
      enabled: false
      repo: ""
      branch: main
      subPath: dags

# -----------------------------------------------------------------------------
# Ollama Configuration (for NL-to-SQL)
# -----------------------------------------------------------------------------
ollama:
  enabled: true
  replicaCount: 1
  
  image:
    repository: ollama/ollama
    tag: latest
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 11434
  
  resources:
    requests:
      cpu: 2
      memory: 8Gi
    limits:
      cpu: 4
      memory: 16Gi
      # Uncomment if GPU is available
      # nvidia.com/gpu: 1
  
  model: codellama:13b
  
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""
  
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# Spark Configuration
# -----------------------------------------------------------------------------
spark:
  enabled: true
  
  master:
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
  
  workers:
    replicas: 3
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 4000m
        memory: 8Gi

# -----------------------------------------------------------------------------
# PostgreSQL (Bitnami Chart)
# -----------------------------------------------------------------------------
postgresql:
  enabled: true
  
  auth:
    postgresPassword: ""  # Set via --set or secrets
    username: novasight
    password: ""  # Set via --set or secrets
    database: novasight
  
  primary:
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    persistence:
      enabled: true
      size: 100Gi
      storageClass: ""
  
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# -----------------------------------------------------------------------------
# Redis (Bitnami Chart)
# -----------------------------------------------------------------------------
redis:
  enabled: true
  
  auth:
    enabled: true
    password: ""  # Set via --set or secrets
  
  master:
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    persistence:
      enabled: true
      size: 10Gi
  
  replica:
    replicaCount: 2
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# -----------------------------------------------------------------------------
# ClickHouse (Bitnami Chart)
# -----------------------------------------------------------------------------
clickhouse:
  enabled: true
  
  shards: 1
  replicaCount: 2
  
  auth:
    username: default
    password: ""  # Set via --set or secrets
  
  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 16Gi
  
  persistence:
    enabled: true
    size: 500Gi
    storageClass: ""
  
  zookeeper:
    enabled: true
    replicaCount: 3
  
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# -----------------------------------------------------------------------------
# Monitoring Configuration
# -----------------------------------------------------------------------------
monitoring:
  enabled: true
  
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s
      labels: {}
  
  grafana:
    enabled: true
    dashboards:
      enabled: true
    datasources:
      enabled: true

# -----------------------------------------------------------------------------
# Network Policies
# -----------------------------------------------------------------------------
networkPolicy:
  enabled: true
  
  # Allow ingress from specific namespaces
  allowedNamespaces:
    - ingress-nginx
    - monitoring

# -----------------------------------------------------------------------------
# Pod Security Policy (deprecated in K8s 1.25+)
# -----------------------------------------------------------------------------
podSecurityPolicy:
  enabled: false

# -----------------------------------------------------------------------------
# Priority Classes
# -----------------------------------------------------------------------------
priorityClassName: ""

# -----------------------------------------------------------------------------
# Annotations to add to all resources
# -----------------------------------------------------------------------------
commonAnnotations: {}

# -----------------------------------------------------------------------------
# Labels to add to all resources
# -----------------------------------------------------------------------------
commonLabels: {}
