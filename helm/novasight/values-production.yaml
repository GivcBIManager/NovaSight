# NovaSight Helm Chart - Production Environment Values
# Usage: helm install novasight ./helm/novasight -f values-production.yaml

# Global settings
global:
  imageRegistry: ghcr.io/novasight

# Backend - production-grade configuration
backend:
  replicaCount: 5
  
  image:
    tag: v1.0.0
    pullPolicy: IfNotPresent
  
  resources:
    requests:
      cpu: 1
      memory: 1Gi
    limits:
      cpu: 4
      memory: 4Gi
  
  autoscaling:
    enabled: true
    minReplicas: 5
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  env:
    FLASK_ENV: production
    LOG_LEVEL: WARNING
    WORKERS: "4"
    THREADS: "4"
  
  podDisruptionBudget:
    enabled: true
    minAvailable: 3
  
  # Production node selection
  nodeSelector:
    node-type: application
  
  tolerations: []
  
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: backend
          topologyKey: kubernetes.io/hostname

# Frontend - production configuration
frontend:
  replicaCount: 3
  
  image:
    tag: v1.0.0
    pullPolicy: IfNotPresent
  
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 512Mi
  
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  
  nodeSelector:
    node-type: application

# Ingress - production domains with enhanced security
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';";
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"
  hosts:
    - host: novasight.io
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend
    - host: www.novasight.io
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend
    - host: api.novasight.io
      paths:
        - path: /
          pathType: Prefix
          service: backend
  tls:
    - secretName: novasight-prod-tls
      hosts:
        - novasight.io
        - www.novasight.io
        - api.novasight.io

# Ollama - production with GPU
ollama:
  enabled: true
  replicaCount: 2
  
  resources:
    requests:
      cpu: 4
      memory: 16Gi
    limits:
      cpu: 8
      memory: 32Gi
      nvidia.com/gpu: 1
  
  model: codellama:13b
  
  persistence:
    enabled: true
    size: 100Gi
    storageClass: fast-ssd
  
  nodeSelector:
    gpu: "true"
  
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule

# Spark - production scale
spark:
  enabled: true
  
  master:
    replicas: 1
    resources:
      requests:
        cpu: 1
        memory: 2Gi
      limits:
        cpu: 4
        memory: 8Gi
  
  workers:
    replicas: 10
    resources:
      requests:
        cpu: 2
        memory: 4Gi
      limits:
        cpu: 8
        memory: 16Gi

# PostgreSQL - production HA
postgresql:
  enabled: true
  
  architecture: replication
  
  primary:
    resources:
      requests:
        cpu: 2
        memory: 4Gi
      limits:
        cpu: 8
        memory: 16Gi
    persistence:
      size: 500Gi
      storageClass: fast-ssd
  
  readReplicas:
    replicaCount: 2
    resources:
      requests:
        cpu: 1
        memory: 2Gi
      limits:
        cpu: 4
        memory: 8Gi
  
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# Redis - production HA
redis:
  enabled: true
  
  architecture: replication
  
  master:
    resources:
      requests:
        cpu: 1
        memory: 2Gi
      limits:
        cpu: 4
        memory: 8Gi
    persistence:
      size: 50Gi
      storageClass: fast-ssd
  
  replica:
    replicaCount: 3
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2
        memory: 4Gi
  
  sentinel:
    enabled: true
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# ClickHouse - production cluster
clickhouse:
  enabled: true
  
  shards: 2
  replicaCount: 3
  
  resources:
    requests:
      cpu: 4
      memory: 16Gi
    limits:
      cpu: 16
      memory: 64Gi
  
  persistence:
    size: 1Ti
    storageClass: fast-ssd
  
  zookeeper:
    enabled: true
    replicaCount: 3
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2
        memory: 4Gi
  
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# Monitoring - full production monitoring
monitoring:
  enabled: true
  
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 15s
      scrapeTimeout: 10s
  
  grafana:
    enabled: true
    dashboards:
      enabled: true
    datasources:
      enabled: true
    persistence:
      enabled: true
      size: 20Gi

# Network Policies - strict for production
networkPolicy:
  enabled: true
  
  allowedNamespaces:
    - ingress-nginx
    - monitoring
    - cert-manager

# Priority class for production workloads
priorityClassName: high-priority

# Common labels for production
commonLabels:
  environment: production
  team: novasight
