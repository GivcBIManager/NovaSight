apiVersion: v2
name: novasight
description: NovaSight - Self-Service BI Platform for Multi-Tenant Analytics
type: application
version: 0.1.0
appVersion: "1.0.0"

keywords:
  - bi
  - analytics
  - data-platform
  - multi-tenant
  - self-service

home: https://github.com/novasight/novasight
sources:
  - https://github.com/novasight/novasight

maintainers:
  - name: NovaSight Team
    email: team@novasight.io

dependencies:
  - name: postgresql
    version: "12.1.6"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
    
  - name: redis
    version: "17.3.11"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
    
  - name: clickhouse
    version: "3.1.0"
    repository: https://charts.bitnami.com/bitnami
    condition: clickhouse.enabled
