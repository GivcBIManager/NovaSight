[pytest]
testpaths = backend/tests tests
python_files = *_test.py test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Markers for test categorization
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require database)
    slow: Slow tests (>1 second)
    security: Security-related tests
    e2e: End-to-end tests (require full stack)
    container: Tests requiring Docker containers

# Timeout for integration tests (5 minutes max)
timeout = 300

# Minimum coverage threshold
# Run with: pytest --cov=app --cov-report=html --cov-fail-under=80

# Integration test examples:
# Run unit tests only:       pytest -m unit
# Run integration tests:     pytest -m integration
# Run all except slow:       pytest -m "not slow"
# Run with containers:       pytest -m container --docker
