# Backend Secrets Template
# NOTE: In production, use sealed-secrets or external-secrets-operator
# DO NOT commit actual secrets to version control
#
# To create sealed secrets:
#   kubeseal --format=yaml < secret.yaml > sealed-secret.yaml
#
# Or use external-secrets-operator with AWS Secrets Manager, HashiCorp Vault, etc.

apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: novasight
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: secrets
  annotations:
    # Indicates this is a template - replace with sealed-secrets in production
    novasight.io/secret-type: "template"
type: Opaque
stringData:
  # Database Connection
  DATABASE_URL: "postgresql://novasight:CHANGE_ME@postgres-service:5432/novasight"
  POSTGRES_USER: "novasight"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # ClickHouse Connection
  CLICKHOUSE_USER: "default"
  CLICKHOUSE_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # Redis Connection
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # Application Secrets
  SECRET_KEY: "CHANGE_ME_GENERATE_SECURE_RANDOM_KEY"
  JWT_SECRET_KEY: "CHANGE_ME_GENERATE_SECURE_RANDOM_KEY"
  ENCRYPTION_MASTER_KEY: "CHANGE_ME_GENERATE_32_BYTE_KEY"
  
  # OAuth/OIDC (if enabled)
  OAUTH_CLIENT_ID: ""
  OAUTH_CLIENT_SECRET: ""
  
  # External Service API Keys
  SENTRY_DSN: ""
