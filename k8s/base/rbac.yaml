apiVersion: v1
kind: ServiceAccount
metadata:
  name: novasight-backend
  namespace: novasight
  labels:
    app.kubernetes.io/name: novasight-backend
    app.kubernetes.io/component: backend

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: novasight-frontend
  namespace: novasight
  labels:
    app.kubernetes.io/name: novasight-frontend
    app.kubernetes.io/component: frontend

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: novasight-backend-role
  namespace: novasight
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: novasight-backend-binding
  namespace: novasight
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: novasight-backend-role
subjects:
  - kind: ServiceAccount
    name: novasight-backend
    namespace: novasight

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: novasight-frontend-role
  namespace: novasight
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: novasight-frontend-binding
  namespace: novasight
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: novasight-frontend-role
subjects:
  - kind: ServiceAccount
    name: novasight-frontend
    namespace: novasight
