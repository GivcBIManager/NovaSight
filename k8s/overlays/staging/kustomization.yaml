apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: novasight-staging

resources:
  - ../../base

namePrefix: staging-

commonLabels:
  environment: staging

commonAnnotations:
  novasight.io/environment: staging

patches:
  - path: backend-patch.yaml
  - path: frontend-patch.yaml
  - path: ingress-patch.yaml

images:
  - name: ghcr.io/novasight/backend
    newTag: develop
  - name: ghcr.io/novasight/frontend
    newTag: develop

replicas:
  - name: backend
    count: 2
  - name: frontend
    count: 1

configMapGenerator:
  - name: backend-config
    behavior: merge
    literals:
      - FLASK_ENV=staging
      - LOG_LEVEL=DEBUG
      - ENABLE_PROFILING=true

  - name: frontend-config
    behavior: merge
    literals:
      - VITE_API_URL=https://api.staging.novasight.io
      - VITE_ENABLE_ANALYTICS=false
