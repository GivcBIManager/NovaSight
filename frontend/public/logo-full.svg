<?xml version="1.0" encoding="UTF-8"?>
<svg width="320" height="100" viewBox="0 0 320 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Metallic gradient for the infinity symbol -->
    <linearGradient id="metalGradientFull1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="25%" style="stop-color:#B8B8B8"/>
      <stop offset="50%" style="stop-color:#9A9A9A"/>
      <stop offset="75%" style="stop-color:#C8C8C8"/>
      <stop offset="100%" style="stop-color:#A0A0A0"/>
    </linearGradient>
    
    <linearGradient id="metalGradientFull2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D0D0D0"/>
      <stop offset="30%" style="stop-color:#888888"/>
      <stop offset="60%" style="stop-color:#A8A8A8"/>
      <stop offset="100%" style="stop-color:#707070"/>
    </linearGradient>
    
    <!-- Brand gradient -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadowFull" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    
    <!-- Highlight filter -->
    <filter id="highlightFull">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feOffset in="blur" dx="-1" dy="-1" result="offsetBlur"/>
      <feFlood flood-color="white" flood-opacity="0.4"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- INFINITY SYMBOL -->
  <!-- Background infinity path - back loop -->
  <path 
    d="M 45 50 
       C 45 28, 67 28, 90 50 
       C 113 72, 135 72, 135 50 
       C 135 28, 113 28, 90 50"
    fill="none" 
    stroke="url(#metalGradientFull2)" 
    stroke-width="12"
    stroke-linecap="round"
    filter="url(#shadowFull)"
    opacity="0.7"
  />
  
  <!-- Front infinity loop - left side -->
  <path 
    d="M 90 50 
       C 67 28, 45 28, 45 50 
       C 45 72, 67 72, 90 50"
    fill="none" 
    stroke="url(#metalGradientFull1)" 
    stroke-width="12"
    stroke-linecap="round"
    filter="url(#highlightFull)"
  />
  
  <!-- Front infinity loop - right side -->
  <path 
    d="M 90 50 
       C 113 72, 135 72, 135 50 
       C 135 28, 113 28, 90 50"
    fill="none" 
    stroke="url(#metalGradientFull1)" 
    stroke-width="12"
    stroke-linecap="round"
    filter="url(#highlightFull)"
  />
  
  <!-- Highlight lines for 3D effect -->
  <path 
    d="M 50 42 C 58 36, 75 36, 85 45"
    fill="none" 
    stroke="white" 
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.4"
  />
  <path 
    d="M 95 55 C 105 64, 120 64, 130 57"
    fill="none" 
    stroke="white" 
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.4"
  />
  
  <!-- NOVASIGHT TEXT -->
  <text x="155" y="58" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="600" fill="#1F2937">
    Nova<tspan fill="url(#brandGradient)">Sight</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="155" y="75" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#6B7280" letter-spacing="1.5">
    INFINITE INSIGHTS
  </text>
</svg>
