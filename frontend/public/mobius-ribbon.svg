<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="320" viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Brushed stainless steel gradients -->
    <linearGradient id="steel1" x1="0%" y1="0%" x2="100%" y2="20%">
      <stop offset="0%" stop-color="#E5E5E5"/>
      <stop offset="15%" stop-color="#D4D4D4"/>
      <stop offset="30%" stop-color="#C0C0C0"/>
      <stop offset="45%" stop-color="#B0B0B0"/>
      <stop offset="60%" stop-color="#C8C8C8"/>
      <stop offset="75%" stop-color="#B8B8B8"/>
      <stop offset="90%" stop-color="#CFCFCF"/>
      <stop offset="100%" stop-color="#BABABA"/>
    </linearGradient>
    
    <linearGradient id="steel2" x1="0%" y1="20%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A0A0A0"/>
      <stop offset="25%" stop-color="#8A8A8A"/>
      <stop offset="50%" stop-color="#787878"/>
      <stop offset="75%" stop-color="#8E8E8E"/>
      <stop offset="100%" stop-color="#9A9A9A"/>
    </linearGradient>
    
    <linearGradient id="steel3" x1="0%" y1="0%" x2="100%" y2="30%">
      <stop offset="0%" stop-color="#D8D8D8"/>
      <stop offset="30%" stop-color="#E8E8E8"/>
      <stop offset="60%" stop-color="#D0D0D0"/>
      <stop offset="100%" stop-color="#C4C4C4"/>
    </linearGradient>
    
    <linearGradient id="steelEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0F0F0"/>
      <stop offset="30%" stop-color="#C0C0C0"/>
      <stop offset="70%" stop-color="#909090"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    
    <linearGradient id="steelEdge2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="30%" stop-color="#B8B8B8"/>
      <stop offset="70%" stop-color="#888888"/>
      <stop offset="100%" stop-color="#686868"/>
    </linearGradient>
    
    <!-- Shadow -->
    <filter id="shadow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="8" dy="12"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
    </filter>
  </defs>
  
  <!-- Ground shadow -->
  <ellipse cx="300" cy="280" rx="220" ry="30" fill="#000" opacity="0.12"/>
  
  <!-- ========== LEFT LOOP ========== -->
  
  <!-- Left loop - back inner surface (darker, goes behind at center) -->
  <path d="M 280 155
           C 220 100, 100 70, 60 130
           C 25 185, 40 230, 100 255
           C 160 275, 230 240, 280 185"
        fill="url(#steel2)" stroke="#808080" stroke-width="1"/>
  
  <!-- Left loop - front outer surface (lighter) -->
  <path d="M 290 145
           C 230 85, 95 55, 50 125
           C 10 190, 30 245, 95 270
           C 165 295, 250 255, 300 190"
        fill="url(#steel1)" stroke="#A0A0A0" stroke-width="0.5"/>
  
  <!-- Left loop - twisted edge connector -->
  <path d="M 50 125 
           C 45 135, 40 160, 60 130"
        fill="url(#steelEdge)" stroke="none"/>
  
  <!-- ========== RIGHT LOOP ========== -->
  
  <!-- Right loop - back inner surface -->
  <path d="M 320 185
           C 370 240, 490 275, 540 215
           C 585 160, 565 105, 500 80
           C 435 55, 360 95, 310 155"
        fill="url(#steel2)" stroke="#808080" stroke-width="1"/>
  
  <!-- Right loop - front outer surface -->
  <path d="M 310 170
           C 360 225, 495 260, 550 195
           C 595 140, 575 80, 505 55
           C 430 30, 345 75, 295 145"
        fill="url(#steel3)" stroke="#B0B0B0" stroke-width="0.5"/>
  
  <!-- ========== CENTER CROSSOVER (THE TWIST) ========== -->
  
  <!-- Back ribbon piece (going under) -->
  <path d="M 270 175 
           Q 300 200, 330 175
           L 330 160
           Q 300 185, 270 160
           Z"
        fill="url(#steel2)" stroke="#707070" stroke-width="0.5"/>
  
  <!-- Front ribbon piece (going over) -->
  <path d="M 270 155
           Q 300 125, 330 155
           L 330 170
           Q 300 140, 270 170
           Z"
        fill="url(#steel1)" stroke="#909090" stroke-width="0.5"/>
  
  <!-- Edge of twist - left side -->
  <path d="M 268 155 L 268 175" 
        stroke="url(#steelEdge)" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Edge of twist - right side -->
  <path d="M 332 155 L 332 175" 
        stroke="url(#steelEdge2)" stroke-width="6" stroke-linecap="round"/>
  
  <!-- ========== HIGHLIGHTS ========== -->
  
  <!-- Top highlight - left outer curve -->
  <path d="M 280 140
           C 220 80, 100 55, 55 115"
        fill="none" stroke="white" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  
  <!-- Top highlight - right outer curve -->
  <path d="M 320 140
           C 380 80, 500 55, 545 115"
        fill="none" stroke="white" stroke-width="3" opacity="0.45" stroke-linecap="round"/>
  
  <!-- Secondary highlights -->
  <path d="M 90 100 C 130 80, 190 80, 240 110"
        fill="none" stroke="white" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
  <path d="M 360 110 C 410 80, 470 80, 510 100"
        fill="none" stroke="white" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
  
  <!-- Inner curve subtle highlights -->
  <path d="M 75 200 C 100 220, 150 230, 200 210"
        fill="none" stroke="white" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <path d="M 400 210 C 450 230, 500 220, 525 200"
        fill="none" stroke="white" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
</svg>
