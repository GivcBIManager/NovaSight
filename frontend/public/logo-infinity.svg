<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="100" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Metallic gradient for the infinity symbol -->
    <linearGradient id="metalGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="25%" style="stop-color:#B8B8B8"/>
      <stop offset="50%" style="stop-color:#9A9A9A"/>
      <stop offset="75%" style="stop-color:#C8C8C8"/>
      <stop offset="100%" style="stop-color:#A0A0A0"/>
    </linearGradient>
    
    <linearGradient id="metalGradient2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D0D0D0"/>
      <stop offset="30%" style="stop-color:#888888"/>
      <stop offset="60%" style="stop-color:#A8A8A8"/>
      <stop offset="100%" style="stop-color:#707070"/>
    </linearGradient>
    
    <!-- Accent gradient with brand color -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    
    <!-- Highlight filter -->
    <filter id="highlight">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feOffset in="blur" dx="-1" dy="-1" result="offsetBlur"/>
      <feFlood flood-color="white" flood-opacity="0.4"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background infinity path - back loop -->
  <path 
    d="M 50 50 
       C 50 25, 75 25, 100 50 
       C 125 75, 150 75, 150 50 
       C 150 25, 125 25, 100 50"
    fill="none" 
    stroke="url(#metalGradient2)" 
    stroke-width="14"
    stroke-linecap="round"
    filter="url(#shadow)"
    opacity="0.7"
  />
  
  <!-- Front infinity loop - left side -->
  <path 
    d="M 100 50 
       C 75 25, 50 25, 50 50 
       C 50 75, 75 75, 100 50"
    fill="none" 
    stroke="url(#metalGradient1)" 
    stroke-width="14"
    stroke-linecap="round"
    filter="url(#highlight)"
  />
  
  <!-- Front infinity loop - right side -->
  <path 
    d="M 100 50 
       C 125 75, 150 75, 150 50 
       C 150 25, 125 25, 100 50"
    fill="none" 
    stroke="url(#metalGradient1)" 
    stroke-width="14"
    stroke-linecap="round"
    filter="url(#highlight)"
  />
  
  <!-- Center crossing accent -->
  <ellipse cx="100" cy="50" rx="8" ry="12" fill="url(#accentGradient)" opacity="0.3"/>
  
  <!-- Highlight lines for 3D effect -->
  <path 
    d="M 55 42 C 65 35, 85 35, 95 45"
    fill="none" 
    stroke="white" 
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.4"
  />
  <path 
    d="M 105 55 C 115 65, 135 65, 145 58"
    fill="none" 
    stroke="white" 
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.4"
  />
</svg>
