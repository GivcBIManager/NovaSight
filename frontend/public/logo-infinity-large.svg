<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Brushed metal gradient - primary -->
    <linearGradient id="brushedMetal1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F5F5"/>
      <stop offset="15%" style="stop-color:#D8D8D8"/>
      <stop offset="35%" style="stop-color:#A8A8A8"/>
      <stop offset="50%" style="stop-color:#8A8A8A"/>
      <stop offset="65%" style="stop-color:#B0B0B0"/>
      <stop offset="85%" style="stop-color:#C8C8C8"/>
      <stop offset="100%" style="stop-color:#9A9A9A"/>
    </linearGradient>
    
    <!-- Brushed metal gradient - shadow side -->
    <linearGradient id="brushedMetal2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C0C0C0"/>
      <stop offset="20%" style="stop-color:#909090"/>
      <stop offset="40%" style="stop-color:#686868"/>
      <stop offset="60%" style="stop-color:#808080"/>
      <stop offset="80%" style="stop-color:#A0A0A0"/>
      <stop offset="100%" style="stop-color:#707070"/>
    </linearGradient>
    
    <!-- Edge highlight -->
    <linearGradient id="edgeHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF" stop-opacity="0.8"/>
      <stop offset="50%" style="stop-color:#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" style="stop-color:#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset dx="4" dy="6" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.25"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Inner glow -->
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="-2" dy="-2" result="offsetBlur"/>
      <feFlood flood-color="white" flood-opacity="0.5"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Brushed texture pattern -->
    <pattern id="brushedTexture" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="transparent"/>
      <line x1="0" y1="2" x2="4" y2="2" stroke="#FFFFFF" stroke-width="0.3" opacity="0.1"/>
    </pattern>
  </defs>
  
  <!-- Ground shadow ellipse -->
  <ellipse cx="200" cy="175" rx="140" ry="15" fill="#000000" opacity="0.1" filter="blur(8px)"/>
  
  <!-- INFINITY SYMBOL - 3D Möbius strip effect -->
  
  <!-- Back section (appears behind at center crossing) -->
  <path 
    d="M 100 100 
       C 100 55, 140 55, 200 100 
       C 260 145, 300 145, 300 100 
       C 300 55, 260 55, 200 100"
    fill="none" 
    stroke="url(#brushedMetal2)" 
    stroke-width="28"
    stroke-linecap="round"
    filter="url(#dropShadow)"
    opacity="0.65"
  />
  
  <!-- Front left loop -->
  <path 
    d="M 200 100 
       C 140 55, 100 55, 100 100 
       C 100 145, 140 145, 200 100"
    fill="none" 
    stroke="url(#brushedMetal1)" 
    stroke-width="28"
    stroke-linecap="round"
    filter="url(#innerGlow)"
  />
  
  <!-- Front right loop -->
  <path 
    d="M 200 100 
       C 260 145, 300 145, 300 100 
       C 300 55, 260 55, 200 100"
    fill="none" 
    stroke="url(#brushedMetal1)" 
    stroke-width="28"
    stroke-linecap="round"
    filter="url(#innerGlow)"
  />
  
  <!-- Brushed texture overlay on front paths -->
  <path 
    d="M 200 100 
       C 140 55, 100 55, 100 100 
       C 100 145, 140 145, 200 100"
    fill="none" 
    stroke="url(#brushedTexture)" 
    stroke-width="26"
    stroke-linecap="round"
    opacity="0.3"
  />
  <path 
    d="M 200 100 
       C 260 145, 300 145, 300 100 
       C 300 55, 260 55, 200 100"
    fill="none" 
    stroke="url(#brushedTexture)" 
    stroke-width="26"
    stroke-linecap="round"
    opacity="0.3"
  />
  
  <!-- Top edge highlights -->
  <path 
    d="M 110 85 C 125 72, 160 68, 185 88"
    fill="none" 
    stroke="white" 
    stroke-width="3"
    stroke-linecap="round"
    opacity="0.5"
  />
  <path 
    d="M 215 112 C 240 132, 275 130, 290 115"
    fill="none" 
    stroke="white" 
    stroke-width="3"
    stroke-linecap="round"
    opacity="0.5"
  />
  
  <!-- Secondary highlights -->
  <path 
    d="M 115 92 C 125 82, 150 78, 170 88"
    fill="none" 
    stroke="white" 
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.3"
  />
  <path 
    d="M 230 112 C 250 125, 270 123, 285 112"
    fill="none" 
    stroke="white" 
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.3"
  />
</svg>
