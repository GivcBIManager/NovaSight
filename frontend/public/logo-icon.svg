<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Metallic gradient -->
    <linearGradient id="metalIcon1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="25%" style="stop-color:#B8B8B8"/>
      <stop offset="50%" style="stop-color:#9A9A9A"/>
      <stop offset="75%" style="stop-color:#C8C8C8"/>
      <stop offset="100%" style="stop-color:#A0A0A0"/>
    </linearGradient>
    
    <linearGradient id="metalIcon2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D0D0D0"/>
      <stop offset="30%" style="stop-color:#888888"/>
      <stop offset="60%" style="stop-color:#A8A8A8"/>
      <stop offset="100%" style="stop-color:#707070"/>
    </linearGradient>
    
    <!-- Brand accent -->
    <linearGradient id="brandIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    
    <!-- Shadow -->
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="white" filter="url(#iconShadow)"/>
  <circle cx="32" cy="32" r="29" fill="none" stroke="url(#brandIcon)" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Infinity symbol - back -->
  <path 
    d="M 18 32 
       C 18 22, 25 22, 32 32 
       C 39 42, 46 42, 46 32 
       C 46 22, 39 22, 32 32"
    fill="none" 
    stroke="url(#metalIcon2)" 
    stroke-width="6"
    stroke-linecap="round"
    opacity="0.6"
  />
  
  <!-- Infinity symbol - front left -->
  <path 
    d="M 32 32 
       C 25 22, 18 22, 18 32 
       C 18 42, 25 42, 32 32"
    fill="none" 
    stroke="url(#metalIcon1)" 
    stroke-width="6"
    stroke-linecap="round"
  />
  
  <!-- Infinity symbol - front right -->
  <path 
    d="M 32 32 
       C 39 42, 46 42, 46 32 
       C 46 22, 39 22, 32 32"
    fill="none" 
    stroke="url(#metalIcon1)" 
    stroke-width="6"
    stroke-linecap="round"
  />
  
  <!-- Highlight -->
  <path 
    d="M 21 28 C 24 25, 28 25, 30 30"
    fill="none" 
    stroke="white" 
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.5"
  />
</svg>
