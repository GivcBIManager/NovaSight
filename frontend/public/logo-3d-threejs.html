<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaSight 3D Möbius Logo - Three.js</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #fafafa 0%, #e5e5e5 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
  #canvas-container {
      width: 600px;
      height: 350px;
    }
    h1 {
      margin-top: 20px;
      font-size: 1.8rem;
      font-weight: 300;
      color: #333;
      letter-spacing: 0.15em;
    }
    .subtitle {
      color: #666;
      font-size: 0.85rem;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <h1>NOVASIGHT</h1>
  <p class="subtitle">Infinite Insights</p>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // Scene setup
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf5f5f5);

    const camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 4, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
    controls.maxPolarAngle = Math.PI / 1.8;
    controls.minPolarAngle = Math.PI / 4;
    controls.enableZoom = true;
    controls.minDistance = 8;
    controls.maxDistance = 20;

    // Studio Lighting Setup
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    // Key light (main light from top-right)
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.5);
    keyLight.position.set(8, 12, 8);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.width = 4096;
    keyLight.shadow.mapSize.height = 4096;
    keyLight.shadow.camera.near = 1;
    keyLight.shadow.camera.far = 50;
    keyLight.shadow.camera.left = -10;
    keyLight.shadow.camera.right = 10;
    keyLight.shadow.camera.top = 10;
    keyLight.shadow.camera.bottom = -10;
    keyLight.shadow.bias = -0.0001;
    scene.add(keyLight);

    // Fill light (softer, from left)
    const fillLight = new THREE.DirectionalLight(0xffffff, 0.6);
    fillLight.position.set(-8, 6, 4);
    scene.add(fillLight);

    // Back/rim light (creates edge highlights)
    const rimLight = new THREE.DirectionalLight(0xffffff, 0.8);
    rimLight.position.set(0, 3, -10);
    scene.add(rimLight);

    // Bottom fill (subtle, reduces harsh shadows)
    const bottomLight = new THREE.DirectionalLight(0xffffff, 0.2);
    bottomLight.position.set(0, -5, 5);
    scene.add(bottomLight);

    // Brushed stainless steel material
    const metalMaterial = new THREE.MeshPhysicalMaterial({
      color: 0xd4d4d4,
      metalness: 1.0,
      roughness: 0.28,
      envMapIntensity: 1.5,
      clearcoat: 0.1,
      clearcoatRoughness: 0.4,
      reflectivity: 0.9,
    });

    // Create figure-8 infinity ribbon geometry (twisted Möbius-like strip)
    function createInfinityRibbon(scale, ribbonWidth, ribbonThickness, segments) {
      const shape = new THREE.Shape();
      const hw = ribbonWidth / 2;
      const ht = ribbonThickness / 2;
      
      // Rectangular cross-section with rounded corners
      const radius = Math.min(hw, ht) * 0.3;
      shape.moveTo(-hw + radius, -ht);
      shape.lineTo(hw - radius, -ht);
      shape.quadraticCurveTo(hw, -ht, hw, -ht + radius);
      shape.lineTo(hw, ht - radius);
      shape.quadraticCurveTo(hw, ht, hw - radius, ht);
      shape.lineTo(-hw + radius, ht);
      shape.quadraticCurveTo(-hw, ht, -hw, ht - radius);
      shape.lineTo(-hw, -ht + radius);
      shape.quadraticCurveTo(-hw, -ht, -hw + radius, -ht);

      // Create the figure-8 path (lemniscate of Bernoulli)
      const path = new THREE.CurvePath();
      const points = [];
      
      for (let i = 0; i <= segments; i++) {
        const t = (i / segments) * Math.PI * 2;
        
        // Lemniscate parametric equations
        const denom = 1 + Math.sin(t) * Math.sin(t);
        const x = (scale * Math.cos(t)) / denom;
        const z = (scale * Math.sin(t) * Math.cos(t)) / denom;
        
        // Add twist - the ribbon rotates as it goes around
        // Full 180° twist over the path to create Möbius-like effect
        const twist = t / 2;
        const y = 0;
        
        points.push(new THREE.Vector3(x * 1.8, y, z * 1.2));
      }
      
      // Create smooth curve through points
      const curve = new THREE.CatmullRomCurve3(points, true, 'catmullrom', 0.5);
      
      // Custom frames for the twist
      const frames = curve.computeFrenetFrames(segments, true);
      
      // Apply twist to the frames
      for (let i = 0; i <= segments; i++) {
        const t = (i / segments) * Math.PI * 2;
        const twistAngle = t; // 360° twist over full path
        
        const normal = frames.normals[i % segments];
        const binormal = frames.binormals[i % segments];
        
        // Rotate normal and binormal around tangent
        const cos = Math.cos(twistAngle);
        const sin = Math.sin(twistAngle);
        
        const newNormal = normal.clone().multiplyScalar(cos).add(binormal.clone().multiplyScalar(sin));
        const newBinormal = normal.clone().multiplyScalar(-sin).add(binormal.clone().multiplyScalar(cos));
        
        frames.normals[i % segments].copy(newNormal);
        frames.binormals[i % segments].copy(newBinormal);
      }

      // Create geometry by extruding along curve with twist
      const extrudeSettings = {
        steps: segments,
        bevelEnabled: false,
        extrudePath: curve,
      };
      
      const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
      geometry.computeVertexNormals();
      
      return geometry;
    }

    // Alternative: More accurate twisted infinity using buffer geometry
    function createTwistedInfinity(a, width, thickness, uSegments, vSegments) {
      const geometry = new THREE.BufferGeometry();
      const positions = [];
      const normals = [];
      const uvs = [];
      const indices = [];

      for (let i = 0; i <= uSegments; i++) {
        const u = (i / uSegments) * Math.PI * 2;
        
        // Lemniscate of Bernoulli (figure-8 / infinity curve)
        const denom = 1 + Math.sin(u) * Math.sin(u);
        const cx = (a * Math.cos(u)) / denom;
        const cz = (a * Math.sin(u) * Math.cos(u)) / denom;
        
        // Tangent vector (derivative of curve)
        const du = 0.001;
        const denomNext = 1 + Math.sin(u + du) * Math.sin(u + du);
        const cxNext = (a * Math.cos(u + du)) / denomNext;
        const czNext = (a * Math.sin(u + du) * Math.cos(u + du)) / denomNext;
        
        const tangent = new THREE.Vector3(cxNext - cx, 0, czNext - cz).normalize();
        
        // Twist angle - 180° twist over half the path (full Möbius)
        const twist = u;
        
        // Create local coordinate frame
        const up = new THREE.Vector3(0, 1, 0);
        let normal = new THREE.Vector3().crossVectors(up, tangent).normalize();
        let binormal = new THREE.Vector3().crossVectors(tangent, normal).normalize();
        
        // Apply twist rotation
        const cos = Math.cos(twist);
        const sin = Math.sin(twist);
        const twistedNormal = normal.clone().multiplyScalar(cos).add(binormal.clone().multiplyScalar(sin));
        const twistedBinormal = normal.clone().multiplyScalar(-sin).add(binormal.clone().multiplyScalar(cos));
        
        for (let j = 0; j <= vSegments; j++) {
          const v = (j / vSegments) * Math.PI * 2;
          
          // Rectangular cross-section
          const hw = width / 2;
          const ht = thickness / 2;
          
          let localX, localY;
          if (j <= vSegments / 4) {
            const t = j / (vSegments / 4);
            localX = -hw + t * width;
            localY = ht;
          } else if (j <= vSegments / 2) {
            const t = (j - vSegments / 4) / (vSegments / 4);
            localX = hw;
            localY = ht - t * thickness;
          } else if (j <= 3 * vSegments / 4) {
            const t = (j - vSegments / 2) / (vSegments / 4);
            localX = hw - t * width;
            localY = -ht;
          } else {
            const t = (j - 3 * vSegments / 4) / (vSegments / 4);
            localX = -hw;
            localY = -ht + t * thickness;
          }
          
          // Transform to world space
          const px = cx + twistedNormal.x * localX + twistedBinormal.x * localY;
          const py = twistedNormal.y * localX + twistedBinormal.y * localY;
          const pz = cz + twistedNormal.z * localX + twistedBinormal.z * localY;
          
          positions.push(px, py, pz);
          
          // Normal pointing outward from cross-section
          const nx = twistedNormal.x * (localX / hw) + twistedBinormal.x * (localY / ht);
          const ny = twistedNormal.y * (localX / hw) + twistedBinormal.y * (localY / ht);
          const nz = twistedNormal.z * (localX / hw) + twistedBinormal.z * (localY / ht);
          const nLen = Math.sqrt(nx*nx + ny*ny + nz*nz) || 1;
          normals.push(nx/nLen, ny/nLen, nz/nLen);
          
          uvs.push(i / uSegments, j / vSegments);
        }
      }

      // Create faces
      for (let i = 0; i < uSegments; i++) {
        for (let j = 0; j < vSegments; j++) {
          const a = i * (vSegments + 1) + j;
          const b = a + 1;
          const c = (i + 1) * (vSegments + 1) + j;
          const d = c + 1;

          indices.push(a, c, b);
          indices.push(b, c, d);
        }
      }

      geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
      geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();

      return geometry;
    }

    // Create the infinity ribbon
    const infinityGeometry = createTwistedInfinity(3.5, 1.2, 0.15, 300, 16);
    const infinity = new THREE.Mesh(infinityGeometry, metalMaterial);
    infinity.castShadow = true;
    infinity.receiveShadow = true;
    infinity.rotation.x = 0.15; // Slight tilt like in the photo
    infinity.position.y = 0.5;
    scene.add(infinity);

    // Ground plane for shadow
    const groundGeometry = new THREE.PlaneGeometry(30, 30);
    const groundMaterial = new THREE.ShadowMaterial({ opacity: 0.2 });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Also add a visible ground with subtle gradient
    const visibleGroundMat = new THREE.MeshStandardMaterial({
      color: 0xfafafa,
      roughness: 0.9,
      metalness: 0,
    });
    const visibleGround = new THREE.Mesh(groundGeometry, visibleGroundMat);
    visibleGround.rotation.x = -Math.PI / 2;
    visibleGround.position.y = -1.21;
    visibleGround.receiveShadow = true;
    scene.add(visibleGround);

    // Environment map for realistic reflections
    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    pmremGenerator.compileEquirectangularShader();
    
    // Create studio-like environment
    const envScene = new THREE.Scene();
    
    // Gradient background sphere
    const envGeometry = new THREE.SphereGeometry(50, 64, 64);
    const envPositions = envGeometry.attributes.position;
    const colors = [];
    
    for (let i = 0; i < envPositions.count; i++) {
      const y = envPositions.getY(i);
      const normalizedY = (y + 50) / 100;
      
      // Studio gradient: bright top, medium sides, slightly darker bottom
      let brightness;
      if (normalizedY > 0.6) {
        brightness = 0.95 + (normalizedY - 0.6) * 0.125; // Bright top
      } else if (normalizedY > 0.3) {
        brightness = 0.85 + (normalizedY - 0.3) * 0.33; // Mid
      } else {
        brightness = 0.7 + normalizedY * 0.5; // Lower
      }
      
      colors.push(brightness, brightness, brightness);
    }
    
    envGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    
    const envMaterial = new THREE.MeshBasicMaterial({
      side: THREE.BackSide,
      vertexColors: true
    });
    
    const envMesh = new THREE.Mesh(envGeometry, envMaterial);
    envScene.add(envMesh);
    
    // Add bright spots to simulate studio lights in reflection
    const lightSpotGeom = new THREE.CircleGeometry(8, 32);
    const lightSpotMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    
    const lightSpot1 = new THREE.Mesh(lightSpotGeom, lightSpotMat);
    lightSpot1.position.set(20, 30, 15);
    lightSpot1.lookAt(0, 0, 0);
    envScene.add(lightSpot1);
    
    const lightSpot2 = new THREE.Mesh(lightSpotGeom, lightSpotMat);
    lightSpot2.position.set(-25, 20, 10);
    lightSpot2.lookAt(0, 0, 0);
    envScene.add(lightSpot2);
    
    const envMap = pmremGenerator.fromScene(envScene, 0, 0.1, 100).texture;
    metalMaterial.envMap = envMap;
    scene.environment = envMap;

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // Handle resize
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });
  </script>
</body>
</html>
