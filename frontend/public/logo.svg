<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="ff" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#20E4B6"/>
      <stop offset="50%" stop-color="#14BFA0"/>
      <stop offset="100%" stop-color="#0EA88A"/>
    </linearGradient>
    <linearGradient id="bf" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#1B3455"/>
      <stop offset="50%" stop-color="#152A45"/>
      <stop offset="100%" stop-color="#0F2035"/>
    </linearGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA88A"/>
      <stop offset="30%" stop-color="#0C7E78"/>
      <stop offset="60%" stop-color="#1A4A6A"/>
      <stop offset="100%" stop-color="#1B3455"/>
    </linearGradient>
    <linearGradient id="tr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1B3455"/>
      <stop offset="40%" stop-color="#1A4A6A"/>
      <stop offset="70%" stop-color="#0C7E78"/>
      <stop offset="100%" stop-color="#14BFA0"/>
    </linearGradient>
    <linearGradient id="rh" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#fff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds" x="-15%" y="-10%" width="130%" height="135%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="b"/>
      <feOffset dx="0.5" dy="1.5" result="o"/>
      <feFlood flood-color="#050D18" flood-opacity="0.2" result="c"/>
      <feComposite in="c" in2="o" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g transform="translate(64, 62) scale(0.26)">

    <!-- Ground shadow -->
    <ellipse cx="0" cy="110" rx="130" ry="14" fill="#050D18" opacity="0.18"/>

    <!-- BACK: bottom arc, behind -->
    <path d="M -140,40 C -140,85 -90,105 -30,105 C 30,105 85,85 115,50
             C 130,30 140,5 138,-15 L 118,-5 C 120,12 112,30 100,45
             C 75,75 25,85 -30,82 C -80,78 -115,60 -115,30 Z"
          fill="url(#bf)" opacity="0.75" filter="url(#ds)"/>

    <!-- BACK: upper right going into twist, behind crossing -->
    <path d="M 138,-15 C 134,-40 120,-60 100,-68 C 82,-75 68,-65 62,-48
             L 48,-38 C 52,-52 62,-60 78,-55 C 98,-48 112,-32 118,-5 Z"
          fill="url(#tr)" opacity="0.65" filter="url(#ds)"/>

    <!-- FRONT: main top arc, lit teal face -->
    <path d="M -140,40 C -145,-10 -120,-55 -75,-72 C -30,-88 25,-80 60,-55
             L 48,-38 C 20,-58 -20,-65 -60,-55 C -100,-42 -120,-10 -115,30 Z"
          fill="url(#ff)" filter="url(#ds)"/>
    <path d="M -140,40 C -145,-10 -120,-55 -75,-72 C -30,-88 25,-80 60,-55
             L 48,-38 C 20,-58 -20,-65 -60,-55 C -100,-42 -120,-10 -115,30 Z"
          fill="url(#rh)"/>

    <!-- FRONT-CROSSING: the twist, passes OVER the back segment -->
    <path d="M 60,-55 C 85,-42 110,-20 128,5 C 142,25 145,48 132,65
             C 118,82 95,82 75,68 C 55,52 30,48 0,52
             C -35,58 -75,65 -108,58 C -130,52 -145,38 -140,22
             L -115,15 C -118,28 -108,38 -92,42
             C -65,48 -30,42 5,35 C 40,28 65,28 85,42
             C 100,52 108,58 112,52 C 120,42 122,28 115,10
             C 105,-10 85,-30 65,-42 L 48,-38 Z"
          fill="url(#tg)" filter="url(#ds)"/>

    <!-- Closing connector -->
    <path d="M -140,22 C -142,30 -140,36 -140,40 L -115,30
             C -115,25 -116,20 -115,15 Z"
          fill="#0F8E7A" opacity="0.7"/>

    <!-- Top edge highlight -->
    <path d="M -140,40 C -145,-10 -120,-55 -75,-72 C -30,-88 25,-80 60,-55"
          fill="none" stroke="#40F0D0" stroke-width="0.8" opacity="0.2"/>
  </g>
</svg>
