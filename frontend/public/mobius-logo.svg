<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="280" viewBox="0 0 500 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Brushed steel gradients for different surfaces -->
    <linearGradient id="steelTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="20%" stop-color="#D0D0D0"/>
      <stop offset="40%" stop-color="#B8B8B8"/>
      <stop offset="60%" stop-color="#C8C8C8"/>
      <stop offset="80%" stop-color="#A8A8A8"/>
      <stop offset="100%" stop-color="#C0C0C0"/>
    </linearGradient>
    
    <linearGradient id="steelSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#909090"/>
      <stop offset="30%" stop-color="#707070"/>
      <stop offset="50%" stop-color="#606060"/>
      <stop offset="70%" stop-color="#787878"/>
      <stop offset="100%" stop-color="#686868"/>
    </linearGradient>
    
    <linearGradient id="steelDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#606060"/>
      <stop offset="50%" stop-color="#505050"/>
      <stop offset="100%" stop-color="#585858"/>
    </linearGradient>
    
    <linearGradient id="steelLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F0F0F0"/>
      <stop offset="50%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#D8D8D8"/>
    </linearGradient>
    
    <!-- Vertical gradients for twist areas -->
    <linearGradient id="twistGradLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8C8C8"/>
      <stop offset="50%" stop-color="#888888"/>
      <stop offset="100%" stop-color="#606060"/>
    </linearGradient>
    
    <linearGradient id="twistGradRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#707070"/>
      <stop offset="50%" stop-color="#909090"/>
      <stop offset="100%" stop-color="#C0C0C0"/>
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="groundShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="5" dy="8"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
    </filter>
  </defs>
  
  <!-- Ground shadow -->
  <ellipse cx="250" cy="240" rx="180" ry="25" fill="#000" opacity="0.15" filter="url(#groundShadow)"/>
  
  <!-- === LEFT LOOP - Back portion (behind crossover) === -->
  <!-- Inner edge of left back -->
  <path d="M 245 130
           C 200 80, 120 60, 80 100
           C 50 135, 50 165, 80 195
           C 110 220, 160 210, 200 180"
        fill="none" stroke="url(#steelDark)" stroke-width="35" stroke-linecap="round"/>
  
  <!-- === RIGHT LOOP - Back portion (behind crossover) === -->
  <!-- This goes behind at the center crossing -->
  <path d="M 255 150
           C 300 200, 380 220, 420 180
           C 450 145, 450 115, 420 85
           C 390 55, 340 65, 300 95"
        fill="none" stroke="url(#steelSide)" stroke-width="35" stroke-linecap="round"/>
  
  <!-- === TWISTED RIBBON SEGMENTS === -->
  
  <!-- Left loop - outer surface (front, light) -->
  <path d="M 250 140
           C 210 95, 140 75, 95 105
           C 55 135, 55 165, 95 195
           C 140 225, 210 200, 250 155"
        fill="none" stroke="url(#steelTop)" stroke-width="32" stroke-linecap="round"/>
  
  <!-- Right loop - outer surface (front, light) -->
  <path d="M 250 140
           C 290 185, 360 205, 405 175
           C 445 145, 445 115, 405 85
           C 360 55, 290 80, 250 125"
        fill="none" stroke="url(#steelLight)" stroke-width="32" stroke-linecap="round"/>
  
  <!-- === CENTER CROSSOVER - Creates the twist illusion === -->
  
  <!-- Back band going under -->
  <path d="M 230 155 Q 250 165, 270 155" 
        fill="none" stroke="url(#steelDark)" stroke-width="30"/>
  
  <!-- Front band going over -->
  <path d="M 230 125 Q 250 115, 270 125" 
        fill="none" stroke="url(#steelTop)" stroke-width="30"/>
  
  <!-- Connecting twist on left side of center -->
  <path d="M 225 125 L 225 155" 
        fill="none" stroke="url(#twistGradLeft)" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Connecting twist on right side of center -->
  <path d="M 275 125 L 275 155" 
        fill="none" stroke="url(#twistGradRight)" stroke-width="8" stroke-linecap="round"/>
  
  <!-- === EDGE HIGHLIGHTS === -->
  
  <!-- Top edge highlight - left loop -->
  <path d="M 245 130
           C 205 85, 135 70, 95 95
           C 60 120, 58 150, 75 175"
        fill="none" stroke="white" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  
  <!-- Top edge highlight - right loop -->  
  <path d="M 255 130
           C 295 85, 365 70, 405 95
           C 440 120, 442 150, 425 175"
        fill="none" stroke="white" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Inner subtle highlights -->
  <path d="M 110 110 C 130 95, 170 90, 200 105"
        fill="none" stroke="white" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M 300 105 C 330 90, 370 95, 390 110"
        fill="none" stroke="white" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
</svg>
