# Grafana Dashboard Provisioning
# ===============================
# Automatically provision dashboards from files

apiVersion: 1

providers:
  - name: 'NovaSight Dashboards'
    orgId: 1
    folder: 'NovaSight'
    folderUid: 'novasight'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/novasight
      foldersFromFilesStructure: false

  - name: 'Infrastructure Dashboards'
    orgId: 1
    folder: 'Infrastructure'
    folderUid: 'infrastructure'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/infrastructure
