# Redis Backup CronJob
# Hourly RDB snapshots for fast recovery
apiVersion: batch/v1
kind: CronJob
metadata:
  name: redis-backup
  namespace: novasight
  labels:
    app: novasight
    component: backup
    database: redis
spec:
  schedule: "0 * * * *"  # Every hour
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600  # 10 minute timeout
      template:
        metadata:
          labels:
            app: novasight
            component: backup
            database: redis
        spec:
          serviceAccountName: backup-sa
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            fsGroup: 999
          containers:
            - name: backup
              image: redis:7-alpine
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="redis_${TIMESTAMP}.rdb"
                  CHECKSUM_FILE="redis_${TIMESTAMP}.sha256"
                  
                  echo "[$(date -Iseconds)] Starting Redis backup..."
                  
                  # Trigger Redis BGSAVE
                  echo "[$(date -Iseconds)] Triggering BGSAVE..."
                  redis-cli -h "${REDIS_HOST}" -a "${REDIS_PASSWORD}" BGSAVE
                  
                  # Wait for BGSAVE to complete
                  echo "[$(date -Iseconds)] Waiting for BGSAVE to complete..."
                  while true; do
                    LASTSAVE=$(redis-cli -h "${REDIS_HOST}" -a "${REDIS_PASSWORD}" LASTSAVE)
                    BGSAVE_STATUS=$(redis-cli -h "${REDIS_HOST}" -a "${REDIS_PASSWORD}" INFO persistence | grep rdb_bgsave_in_progress | cut -d: -f2 | tr -d '\r')
                    if [ "$BGSAVE_STATUS" = "0" ]; then
                      break
                    fi
                    sleep 1
                  done
                  
                  echo "[$(date -Iseconds)] BGSAVE completed, copying RDB file..."
                  
                  # Copy the RDB file from Redis data volume
                  cp /data/dump.rdb "/backup/${BACKUP_FILE}"
                  
                  # Calculate checksum
                  sha256sum "/backup/${BACKUP_FILE}" > "/backup/${CHECKSUM_FILE}"
                  
                  # Get backup size
                  BACKUP_SIZE=$(du -h "/backup/${BACKUP_FILE}" | cut -f1)
                  echo "[$(date -Iseconds)] Backup size: ${BACKUP_SIZE}"
                  
                  # Upload to S3
                  echo "[$(date -Iseconds)] Uploading to S3..."
                  aws s3 cp "/backup/${BACKUP_FILE}" "s3://${S3_BUCKET}/redis/${BACKUP_FILE}" \
                    --storage-class STANDARD_IA \
                    --sse aws:kms \
                    --sse-kms-key-id "${KMS_KEY_ID}"
                  
                  aws s3 cp "/backup/${CHECKSUM_FILE}" "s3://${S3_BUCKET}/redis/${CHECKSUM_FILE}"
                  
                  # Cleanup local files
                  rm -f "/backup/${BACKUP_FILE}" "/backup/${CHECKSUM_FILE}"
                  
                  # Apply retention - keep last 7 days (168 hourly backups)
                  echo "[$(date -Iseconds)] Applying retention policy..."
                  CUTOFF_DATE=$(date -d '7 days ago' +%Y%m%d)
                  aws s3 ls "s3://${S3_BUCKET}/redis/" | while read -r line; do
                    FILE_DATE=$(echo "$line" | awk '{print $4}' | grep -oP 'redis_\K[0-9]{8}' || echo "")
                    if [ -n "$FILE_DATE" ] && [ "$FILE_DATE" -lt "$CUTOFF_DATE" ]; then
                      FILE_NAME=$(echo "$line" | awk '{print $4}')
                      echo "[$(date -Iseconds)] Deleting old backup: ${FILE_NAME}"
                      aws s3 rm "s3://${S3_BUCKET}/redis/${FILE_NAME}"
                    fi
                  done
                  
                  echo "[$(date -Iseconds)] Backup completed successfully: ${BACKUP_FILE}"
              env:
                - name: REDIS_HOST
                  value: redis-service
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: redis-credentials
                      key: password
                - name: S3_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: s3-bucket
                - name: KMS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: backup-encryption
                      key: kms-key-id
                - name: AWS_REGION
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: aws-region
              volumeMounts:
                - name: backup-volume
                  mountPath: /backup
                - name: redis-data
                  mountPath: /data
                  readOnly: true
          volumes:
            - name: backup-volume
              emptyDir:
                sizeLimit: 2Gi
            - name: redis-data
              persistentVolumeClaim:
                claimName: redis-data-pvc
                readOnly: true
          restartPolicy: OnFailure
