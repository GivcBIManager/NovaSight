version: '3.8'

# Performance Testing Stack with k6, InfluxDB, and Grafana
# Usage: docker compose up -d

services:
  # k6 load testing tool
  k6:
    image: grafana/k6:latest
    volumes:
      - ./:/scripts:ro
      - ./results:/results
    environment:
      - K6_OUT=influxdb=http://influxdb:8086/k6
      - API_URL=${API_URL:-http://host.docker.internal:5000}
      - TENANT_SLUG=${TENANT_SLUG:-perf-test}
      - TEST_USER=${TEST_USER:-perf-test@example.com}
      - TEST_PASSWORD=${TEST_PASSWORD:-Admin123!!}
      - ENVIRONMENT=${ENVIRONMENT:-local}
    networks:
      - perf-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      influxdb:
        condition: service_healthy
    profiles:
      - run-test

  # InfluxDB for storing k6 metrics
  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_HTTP_AUTH_ENABLED=false
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=Admin123!
    volumes:
      - influxdb-data:/var/lib/influxdb
    networks:
      - perf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=Admin123!
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ../grafana/dashboards:/var/lib/grafana/dashboards
      - ../grafana/provisioning:/etc/grafana/provisioning
    networks:
      - perf-network
    depends_on:
      influxdb:
        condition: service_healthy

networks:
  perf-network:
    driver: bridge

volumes:
  influxdb-data:
  grafana-data:
